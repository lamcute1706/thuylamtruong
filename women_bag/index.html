<!DOCTYPE html>
<html>
<head>
    <title>Women's Products</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h2>WOMEN'S PRODUCTS</h2>

        <div class="menu">
            <a href="#">All</a>
            <a href="#">Clothings</a>
            <a href="#">Bags</a>
            <a href="#">Shoes</a>
            <a href="#">Watches</a>
            <a href="#">Googles</a>
        </div>
    </div>

    <div class="line"></div>

    <div class="product-box">

        <div class="main">

            <div class="products">

                <div class="card">
                    <img src="https://bazaarvietnam.vn/wp-content/uploads/2022/11/louis-vuitton-denim-2.jpg">

                    <div class="name">Women Bags</div>

                    <div class="divider"></div>

                    <div class="price">€100.00</div>
                    <div class="old">€60.00</div>

                    <button>ADD TO CART</button>
                </div>


                <div class="card">
                    <img src="https://bazaarvietnam.vn/wp-content/uploads/2022/11/louis-vuitton-5-1.jpg">

                    <div class="name">Google</div>

                    <div class="divider"></div>

                    <div class="price">€25.00</div>

                    <button>ADD TO CART</button>
                </div>

            </div>


            <div class="banner">

                <img src="https://bazaarvietnam.vn/wp-content/uploads/2022/11/louis-vuitton-6-1.jpg">

                <div class="banner-text">
                    <h1>FOR WOMEN</h1>
                    <button>VIEW ALL</button>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
